<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. Arela Agako – Clinical Psychologist</title>
  <meta name="description" content="Links and resources for Dr. Arela Agako, Clinical Psychologist." />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f4f0 0%, #d4e8e0 50%, #c8dfd6 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    /* Avatar */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #4a8c76;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #fff;
      box-shadow: 0 4px 16px rgba(74, 140, 118, 0.35);
      flex-shrink: 0;
    }

    /* Name & title */
    .profile h1 {
      font-size: 1.45rem;
      font-weight: 700;
      color: #1e3a30;
      text-align: center;
      line-height: 1.3;
    }

    .profile p {
      font-size: 0.95rem;
      color: #4a6b5e;
      text-align: center;
      margin-top: 0.35rem;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      width: 100%;
      padding: 0.9rem 1.25rem;
      background: #fff;
      border: 1.5px solid #c2dbd3;
      border-radius: 12px;
      color: #1e3a30;
      text-decoration: none;
      font-size: 0.975rem;
      font-weight: 500;
      transition: background 0.18s, box-shadow 0.18s, border-color 0.18s, transform 0.12s;
      box-shadow: 0 2px 8px rgba(74, 140, 118, 0.08);
    }

    .link-btn:hover,
    .link-btn:focus-visible {
      background: #f0faf6;
      border-color: #4a8c76;
      box-shadow: 0 4px 16px rgba(74, 140, 118, 0.2);
      transform: translateY(-1px);
      outline: none;
    }

    .link-btn .icon {
      font-size: 1.25rem;
      flex-shrink: 0;
      width: 1.75rem;
      text-align: center;
    }

    .link-btn .label {
      flex: 1;
    }

    /* Divider */
    .divider {
      width: 100%;
      border: none;
      border-top: 1px solid #c2dbd3;
      margin: 0.25rem 0;
    }

    /* Footer */
    footer {
      font-size: 0.78rem;
      color: #7aa898;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="avatar" aria-hidden="true">👩‍⚕️</div>

    <div class="profile">
      <h1>Dr. Arela Agako</h1>
      <p>Clinical Psychologist</p>
    </div>

    <nav class="links" aria-label="Links">

      <a class="link-btn" href="https://drarelaagako.com" target="_blank" rel="noopener noreferrer">
        <span class="icon">🌐</span>
        <span class="label">Official Website</span>
      </a>

      <a class="link-btn" href="https://drarelaagako.com/book" target="_blank" rel="noopener noreferrer">
        <span class="icon">📅</span>
        <span class="label">Book an Appointment</span>
      </a>

      <hr class="divider" />

      <a class="link-btn" href="https://instagram.com/drarelaagako" target="_blank" rel="noopener noreferrer">
        <span class="icon">📸</span>
        <span class="label">Instagram</span>
      </a>

      <a class="link-btn" href="https://linkedin.com/in/drarelaagako" target="_blank" rel="noopener noreferrer">
        <span class="icon">💼</span>
        <span class="label">LinkedIn</span>
      </a>

      <a class="link-btn" href="https://facebook.com/drarelaagako" target="_blank" rel="noopener noreferrer">
        <span class="icon">👥</span>
        <span class="label">Facebook</span>
      </a>

      <hr class="divider" />

      <a class="link-btn" href="mailto:contact@drarelaagako.com">
        <span class="icon">✉️</span>
        <span class="label">Email</span>
      </a>

    </nav>

    <footer>
      &copy; <span id="year"></span> Dr. Arela Agako
    </footer>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
